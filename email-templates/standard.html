<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light dark"><meta name="supported-color-schemes" content="light dark"><title>{{heading}}</title><style>@media(max-width:620px){.shell{padding:16px!important}.card{border-radius:18px!important}.content{padding:28px 22px!important}.header{padding:24px 22px!important}.button{display:block!important;text-align:center!important}}@media(prefers-color-scheme:dark){.page{background:#111827!important}.card{background:#ffffff!important}.muted{color:#6b7280!important}}</style></head><body class="page" style="margin:0;background:#f3f4f6;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#111827"><div style="display:none;max-height:0;overflow:hidden">{{heading}}</div><table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="background:#f3f4f6;padding:40px 16px"><tr><td align="center"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="card" style="max-width:600px;background:#fff;border:1px solid #e5e7eb;border-radius:24px;overflow:hidden;box-shadow:0 16px 40px rgba(17,24,39,.08)"><tr><td class="header" style="padding:28px 36px;border-bottom:1px solid #eef0f2"><a href="{{websiteUrl}}" style="text-decoration:none"><img src="{{logoUrl}}" width="44" height="44" alt="{{brandName}}" style="vertical-align:middle;border-radius:12px"><span style="margin-left:12px;color:#111827;font-size:18px;font-weight:800;letter-spacing:.02em">{{brandName}}</span></a></td></tr><tr><td class="content" style="padding:42px 36px"><p style="margin:0 0 12px;color:{{brandColor}};font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase">{{brandName}}</p><h1 style="margin:0 0 18px;font-size:30px;line-height:1.2;letter-spacing:-.03em;color:#111827">{{heading}}</h1><p style="margin:0 0 14px;font-size:16px;line-height:1.7;color:#374151">Hi {{userName}},</p><p style="margin:0 0 28px;font-size:16px;line-height:1.7;color:#374151">{{message}}</p><table role="presentation" cellspacing="0" cellpadding="0"><tr><td bgcolor="{{brandColor}}" style="border-radius:12px"><a class="button" href="{{buttonUrl}}" style="display:inline-block;padding:14px 24px;color:#fff;text-decoration:none;font-size:15px;font-weight:800">{{buttonText}}</a></td></tr></table><p class="muted" style="margin:28px 0 0;font-size:13px;line-height:1.6;color:#6b7280">If the button does not work, copy this link:<br><a href="{{buttonUrl}}" style="color:{{brandColor}};word-break:break-all">{{buttonUrl}}</a></p></td></tr><tr><td style="padding:28px 36px;background:#f9fafb;border-top:1px solid #eef0f2;text-align:center"><p style="margin:0 0 12px;font-size:13px;color:#4b5563">{{footerText}}</p><p style="margin:0 0 16px;font-size:12px"><a href="{{socialInstagramUrl}}" style="color:#4b5563;margin:0 8px">Instagram</a><a href="{{socialFacebookUrl}}" style="color:#4b5563;margin:0 8px">Facebook</a><a href="{{socialXUrl}}" style="color:#4b5563;margin:0 8px">X</a></p><p style="margin:0 0 8px;font-size:11px;color:#6b7280"><a href="{{privacyUrl}}" style="color:#6b7280">Privacy</a> · <a href="{{termsUrl}}" style="color:#6b7280">Terms</a> · <a href="{{contactUrl}}" style="color:#6b7280">Contact</a></p><p style="margin:0;font-size:11px;color:#9ca3af">© {{currentYear}} {{companyName}}. All rights reserved.</p></td></tr></table></td></tr></table></body></html>
