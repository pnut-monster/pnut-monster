<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light dark"><title>Wallet topped up</title><style>@media(max-width:620px){.shell{padding:16px!important}.content{padding:28px 22px!important}}</style></head><body style="margin:0;background:#f3f4f6;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="padding:40px 16px"><tr><td align="center"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#fff;border-radius:24px;overflow:hidden;border:1px solid #e5e7eb"><tr><td class="content" style="padding:42px 36px"><img src="{{logoUrl}}" width="48" height="48" alt="{{brandName}}" style="border-radius:12px"><h1 style="margin:24px 0 10px;color:#111827;font-size:29px">Wallet topped up</h1><p style="margin:0 0 24px;color:#4b5563;font-size:16px">Hi {{userName}}, your wallet credit is ready to use.</p><div style="padding:26px;background:{{brandColor}};border-radius:18px;text-align:center;color:#fff"><p style="margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.8">Amount added</p><p style="margin:0;font-size:36px;font-weight:800">{{amount}}</p><div style="height:1px;margin:20px 0;background:rgba(255,255,255,.25)"></div><p style="margin:0 0 4px;font-size:12px;opacity:.8">New balance</p><p style="margin:0;font-size:20px;font-weight:800">{{newBalance}}</p></div><p style="margin:22px 0 0;color:#6b7280;font-size:12px">Transaction ID: <span style="font-family:ui-monospace,monospace">{{paymentId}}</span></p></td></tr><tr><td style="padding:24px 36px;background:#f9fafb;text-align:center"><p style="margin:0 0 8px;font-size:11px"><a href="{{privacyUrl}}" style="color:#6b7280">Privacy</a> · <a href="{{termsUrl}}" style="color:#6b7280">Terms</a> · <a href="{{contactUrl}}" style="color:#6b7280">Contact</a></p><p style="margin:0;font-size:11px;color:#9ca3af">© {{currentYear}} {{companyName}}</p></td></tr></table></td></tr></table></body></html>
