<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light dark"><title>Invoice {{invoiceNumber}}</title><style>@media(max-width:620px){.shell{padding:16px!important}.content{padding:26px 20px!important}.button{display:block!important;text-align:center!important}}</style></head><body style="margin:0;background:#f3f4f6;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="padding:40px 16px"><tr><td align="center"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#fff;border:1px solid #e5e7eb;border-radius:24px;overflow:hidden"><tr><td class="content" style="padding:36px"><table role="presentation" width="100%"><tr><td><img src="{{logoUrl}}" width="48" height="48" alt="{{brandName}}" style="border-radius:12px"></td><td style="text-align:right"><strong style="font-size:22px;color:#111827">INVOICE</strong><br><span style="font-size:12px;color:#6b7280">#{{invoiceNumber}}</span></td></tr></table><p style="margin:30px 0 8px;color:#374151">Hi {{userName}},</p><p style="margin:0 0 24px;color:#6b7280">Here is your invoice dated {{invoiceDate}}.</p><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="font-size:14px">{{{lineItemsHtml}}}</table><table role="presentation" width="100%" style="margin-top:18px;border-top:2px solid #e5e7eb"><tr><td style="padding-top:16px;font-size:17px;font-weight:800">Total</td><td style="padding-top:16px;text-align:right;font-size:20px;font-weight:800;color:{{brandColor}}">{{amount}}</td></tr></table><table role="presentation" style="margin-top:28px"><tr><td bgcolor="{{brandColor}}" style="border-radius:12px"><a class="button" href="{{buttonUrl}}" style="display:inline-block;padding:14px 24px;color:#fff;text-decoration:none;font-weight:800">View invoice</a></td></tr></table></td></tr><tr><td style="padding:24px 36px;background:#f9fafb;text-align:center"><p style="margin:0 0 8px;font-size:11px"><a href="{{privacyUrl}}" style="color:#6b7280">Privacy</a> · <a href="{{termsUrl}}" style="color:#6b7280">Terms</a> · <a href="{{contactUrl}}" style="color:#6b7280">Contact</a></p><p style="margin:0;font-size:11px;color:#9ca3af">© {{currentYear}} {{companyName}}</p></td></tr></table></td></tr></table></body></html>
