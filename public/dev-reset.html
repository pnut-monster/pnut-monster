<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Development Cache</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fafbfc;
        color: #1a1a1a;
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resetting development cache</h1>
      <p id="status">Clearing service workers and browser caches...</p>
    </main>
    <script>
      (async () => {
        const status = document.getElementById("status");

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          sessionStorage.removeItem("pnut-dev-sw-reset");
          status.textContent = "Done. Reloading the app...";
          window.location.replace("/?dev-cache-reset=" + Date.now());
        } catch (error) {
          status.textContent = "Reset failed. Clear site data manually, then reload.";
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
