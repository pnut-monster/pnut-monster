<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Invoice {{invoiceNumber}}</title>
<!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
@media(max-width:620px){
  .shell{padding:12px!important}
  .card{border-radius:20px!important}
  .content{padding:26px 20px!important}
  .button{display:block!important;text-align:center!important}
}
@media(prefers-color-scheme:dark){
  .page{background:#1A1A1A!important}
  .card{background:#262626!important;border-color:#333!important}
  .content p,.content td,.content strong{color:#F5F5F5!important}
  .footer-wrap{background:#1F1F1F!important;border-color:#333!important}
}
</style>
</head>
<body class="page" style="margin:0;padding:0;background:#FFF8E7;font-family:Nunito,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1A1A1A">
<div style="display:none;max-height:0;overflow:hidden">Invoice #{{invoiceNumber}} from {{brandName}}</div>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="background:#FFF8E7;padding:32px 16px">
<tr><td align="center">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="card" style="max-width:620px;background:#ffffff;border:1px solid #E5E7EB;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(26,26,26,.06)">

<!-- Accent bar -->
<tr><td style="height:4px;background:linear-gradient(90deg,#F5B731,#4CAF50)"></td></tr>

<!-- Content -->
<tr><td class="content" style="padding:36px">

<!-- Invoice header -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
<tr>
<td style="vertical-align:middle">
<img src="{{logoUrl}}" width="44" height="44" alt="{{brandName}}" style="border-radius:12px;border:2px solid #FFF8E7">
</td>
<td style="text-align:right;vertical-align:middle">
<p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#F5B731;font-weight:800">Invoice</p>
<p style="margin:2px 0 0;font-size:18px;font-weight:800;color:#1A1A1A">#{{invoiceNumber}}</p>
</td>
</tr>
</table>

<!-- Greeting -->
<p style="margin:28px 0 6px;color:#374151;font-size:15px">Hi {{userName}},</p>
<p style="margin:0 0 24px;color:#6B7280;font-size:14px">Here is your invoice dated <strong style="color:#1A1A1A">{{invoiceDate}}</strong>.</p>

<!-- Line items -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="font-size:14px;border-top:1px solid #F3F4F6">
{{{lineItemsHtml}}}
</table>

<!-- Total -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-top:18px;border-top:2px solid #E5E7EB">
<tr>
<td style="padding-top:16px;font-size:16px;font-weight:800;color:#1A1A1A">Total</td>
<td style="padding-top:16px;text-align:right;font-size:22px;font-weight:800;color:#4CAF50">{{amount}}</td>
</tr>
</table>

<!-- CTA Button -->
<table role="presentation" cellspacing="0" cellpadding="0" style="margin-top:28px">
<tr><td bgcolor="#4CAF50" style="border-radius:12px;box-shadow:0 2px 8px rgba(76,175,80,.3)">
<a class="button" href="{{buttonUrl}}" style="display:inline-block;padding:14px 28px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;font-family:Nunito,sans-serif">View invoice</a>
</td></tr>
</table>

</td></tr>

<!-- Footer -->
<tr><td class="footer-wrap" style="padding:20px 36px;background:#FAFBFC;border-top:1px solid #F3F4F6;text-align:center">
<p style="margin:0 0 6px;font-size:11px;color:#9CA3AF">
<a href="{{privacyUrl}}" style="color:#9CA3AF;text-decoration:none">Privacy</a> &middot;
<a href="{{termsUrl}}" style="color:#9CA3AF;text-decoration:none">Terms</a> &middot;
<a href="{{contactUrl}}" style="color:#9CA3AF;text-decoration:none">Contact</a>
</p>
<p style="margin:0;font-size:10px;color:#D1D5DB">&copy; {{currentYear}} {{companyName}}</p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
