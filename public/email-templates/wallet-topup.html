<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Wallet topped up</title>
<!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
@media(max-width:620px){
  .shell{padding:12px!important}
  .card{border-radius:20px!important}
  .content{padding:28px 20px!important}
  .wallet-box{border-radius:16px!important;padding:22px 18px!important}
  .amount-text{font-size:32px!important}
}
@media(prefers-color-scheme:dark){
  .page{background:#1A1A1A!important}
  .card{background:#262626!important;border-color:#333!important}
  .content h1,.content p{color:#F5F5F5!important}
  .footer-wrap{background:#1F1F1F!important;border-color:#333!important}
}
</style>
</head>
<body class="page" style="margin:0;padding:0;background:#FFF8E7;font-family:Nunito,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1A1A1A">
<div style="display:none;max-height:0;overflow:hidden">{{amount}} added to your {{brandName}} wallet</div>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="background:#FFF8E7;padding:32px 16px">
<tr><td align="center">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="card" style="max-width:600px;background:#ffffff;border:1px solid #E5E7EB;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(26,26,26,.06)">

<!-- Accent bar -->
<tr><td style="height:4px;background:linear-gradient(90deg,#F5B731,#4CAF50)"></td></tr>

<!-- Content -->
<tr><td class="content" style="padding:40px 36px">

<!-- Logo -->
<img src="{{logoUrl}}" width="44" height="44" alt="{{brandName}}" style="border-radius:12px;border:2px solid #FFF8E7">

<h1 style="margin:22px 0 10px;color:#1A1A1A;font-size:28px;font-family:Nunito,sans-serif;font-weight:800;letter-spacing:-.02em">Wallet topped up &#127881;</h1>
<p style="margin:0 0 24px;color:#4B5563;font-size:15px;line-height:1.6">Hi {{userName}}, your wallet credit is ready to use.</p>

<!-- Wallet amount card -->
<div class="wallet-box" style="padding:28px 24px;background:linear-gradient(135deg,#4CAF50 0%,#388E3C 100%);border-radius:20px;text-align:center;color:#ffffff">
<p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;opacity:.85;font-weight:600;color:#ffffff">Amount added</p>
<p class="amount-text" style="margin:0;font-size:38px;font-weight:800;color:#ffffff">{{amount}}</p>
<div style="height:1px;margin:18px auto;max-width:120px;background:rgba(255,255,255,.25)"></div>
<p style="margin:0 0 4px;font-size:11px;opacity:.85;font-weight:600;color:#ffffff">New balance</p>
<p style="margin:0;font-size:22px;font-weight:800;color:#ffffff">{{newBalance}}</p>
</div>

<!-- Transaction ID -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-top:20px">
<tr><td style="padding:12px 16px;background:#FAFBFC;border:1px solid #F3F4F6;border-radius:10px">
<p style="margin:0;color:#6B7280;font-size:12px">Transaction ID: <span style="font-family:ui-monospace,SFMono-Regular,monospace;color:#1A1A1A;font-weight:600">{{paymentId}}</span></p>
</td></tr>
</table>

</td></tr>

<!-- Footer -->
<tr><td class="footer-wrap" style="padding:20px 36px;background:#FAFBFC;border-top:1px solid #F3F4F6;text-align:center">
<p style="margin:0 0 6px;font-size:11px;color:#9CA3AF">
<a href="{{privacyUrl}}" style="color:#9CA3AF;text-decoration:none">Privacy</a> &middot;
<a href="{{termsUrl}}" style="color:#9CA3AF;text-decoration:none">Terms</a> &middot;
<a href="{{contactUrl}}" style="color:#9CA3AF;text-decoration:none">Contact</a>
</p>
<p style="margin:0;font-size:10px;color:#D1D5DB">&copy; {{currentYear}} {{companyName}}</p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
