<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>{{heading}}</title>
<!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
@media(max-width:620px){
  .shell{padding:12px!important}
  .card{border-radius:20px!important}
  .content{padding:28px 20px!important}
  .header{padding:22px 20px!important}
  .button{display:block!important;text-align:center!important}
  .footer-cell{padding:20px 20px!important}
}
@media(prefers-color-scheme:dark){
  .page{background:#1A1A1A!important}
  .card{background:#262626!important;border-color:#333!important}
  .content h1,.content p,.content strong{color:#F5F5F5!important}
  .content .muted-text{color:#A3A3A3!important}
  .footer-wrap{background:#1F1F1F!important;border-color:#333!important}
  .footer-text{color:#A3A3A3!important}
}
</style>
</head>
<body class="page" style="margin:0;padding:0;background:#FFF8E7;font-family:Nunito,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1A1A1A">
<div style="display:none;max-height:0;overflow:hidden">{{heading}}</div>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="shell" style="background:#FFF8E7;padding:32px 16px">
<tr><td align="center">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="card" style="max-width:600px;background:#ffffff;border:1px solid #E5E7EB;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(26,26,26,.06)">

<!-- Accent bar -->
<tr><td style="height:4px;background:linear-gradient(90deg,#F5B731,#4CAF50)"></td></tr>

<!-- Header -->
<tr><td class="header" style="padding:24px 36px;border-bottom:1px solid #F3F4F6">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
<tr>
<td>
<a href="{{websiteUrl}}" style="text-decoration:none;display:inline-flex;align-items:center">
<img src="{{logoUrl}}" width="40" height="40" alt="{{brandName}}" style="vertical-align:middle;border-radius:10px;border:2px solid #FFF8E7">
<span style="margin-left:10px;color:#1A1A1A;font-size:17px;font-weight:800;letter-spacing:.01em;font-family:Nunito,sans-serif">{{brandName}}</span>
</a>
</td>
</tr>
</table>
</td></tr>

<!-- Content -->
<tr><td class="content" style="padding:40px 36px">
<p style="margin:0 0 8px;color:#F5B731;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase">{{brandName}}</p>
<h1 style="margin:0 0 20px;font-size:28px;line-height:1.25;letter-spacing:-.02em;color:#1A1A1A;font-family:Nunito,sans-serif;font-weight:800">{{heading}}</h1>
<p style="margin:0 0 12px;font-size:15px;line-height:1.7;color:#374151">Hi {{userName}},</p>
<p style="margin:0 0 28px;font-size:15px;line-height:1.7;color:#374151">{{message}}</p>

<!-- CTA Button -->
<table role="presentation" cellspacing="0" cellpadding="0">
<tr><td bgcolor="#4CAF50" style="border-radius:12px;box-shadow:0 2px 8px rgba(76,175,80,.3)">
<a class="button" href="{{buttonUrl}}" style="display:inline-block;padding:14px 28px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;font-family:Nunito,sans-serif;letter-spacing:.01em">{{buttonText}}</a>
</td></tr>
</table>

<p class="muted-text" style="margin:24px 0 0;font-size:12px;line-height:1.6;color:#6B7280">If the button doesn't work, copy this link:<br>
<a href="{{buttonUrl}}" style="color:#4CAF50;word-break:break-all;font-size:12px">{{buttonUrl}}</a></p>
</td></tr>

<!-- Footer -->
<tr><td class="footer-wrap footer-cell" style="padding:24px 36px;background:#FAFBFC;border-top:1px solid #F3F4F6;text-align:center">
<p class="footer-text" style="margin:0 0 10px;font-size:13px;color:#4B5563;font-weight:600">{{footerText}}</p>
<p style="margin:0 0 14px;font-size:12px">
<a href="{{socialInstagramUrl}}" style="color:#6B7280;text-decoration:none;margin:0 8px;font-weight:600">Instagram</a>
<a href="{{socialFacebookUrl}}" style="color:#6B7280;text-decoration:none;margin:0 8px;font-weight:600">Facebook</a>
<a href="{{socialXUrl}}" style="color:#6B7280;text-decoration:none;margin:0 8px;font-weight:600">X</a>
</p>
<p style="margin:0 0 6px;font-size:11px;color:#9CA3AF">
<a href="{{privacyUrl}}" style="color:#9CA3AF;text-decoration:none">Privacy</a> &middot;
<a href="{{termsUrl}}" style="color:#9CA3AF;text-decoration:none">Terms</a> &middot;
<a href="{{contactUrl}}" style="color:#9CA3AF;text-decoration:none">Contact</a>
</p>
<p style="margin:0;font-size:10px;color:#D1D5DB">&copy; {{currentYear}} {{companyName}}. All rights reserved.</p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
