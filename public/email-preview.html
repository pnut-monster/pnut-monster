<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Email Template Preview - All Templates</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; padding: 24px; }
h1 { text-align: center; font-size: 20px; color: #F5B731; margin-bottom: 24px; letter-spacing: .05em; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(560px, 1fr)); gap: 24px; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
.card-header { padding: 12px 16px; background: #222; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 14px; color: #4CAF50; font-weight: 600; }
.card-header span { font-size: 11px; color: #888; }
.card iframe { width: 100%; height: 700px; border: none; background: #fff; }
</style>
</head>
<body>
<h1>PNUT MONSTER — Email Templates</h1>
<div class="grid" id="grid"></div>
<script>
const sampleData = {
  brandName: 'PNUT MONSTER',
  brandColor: '#4CAF50',
  accentColor: '#F5B731',
  logoUrl: '/icons/icon-192.png',
  websiteUrl: 'http://localhost:3001',
  userName: 'Jatin',
  heading: 'Welcome to PNUT MONSTER!',
  message: 'Thanks for joining the healthy food revolution. Your account is ready and waiting for your first delicious order.',
  buttonText: 'Start Ordering',
  buttonUrl: 'http://localhost:3001/menu',
  footerText: 'Healthy food, made monstrously delicious.',
  supportEmail: 'support@pnut.monster',
  socialInstagramUrl: 'https://instagram.com/pnutmonster',
  socialFacebookUrl: 'https://facebook.com/pnutmonster',
  socialXUrl: 'https://x.com/pnutmonster',
  privacyUrl: 'http://localhost:3001/privacy',
  termsUrl: 'http://localhost:3001/terms',
  contactUrl: 'http://localhost:3001/contact',
  currentYear: '2026',
  companyName: 'PNUT Monster Foods Private Limited',
  otp: '847293',
  expiryTime: '10 minutes',
  resetLink: 'http://localhost:3001/reset-password?token=abc123xyz',
  orderNumber: 'PM-20260722-0042',
  outletName: 'PNUT MONSTER HSR Layout',
  orderType: 'Pickup',
  paymentMethod: 'Wallet',
  estimatedTime: 'Ready in ~15 minutes',
  subtotal: '₹ 485.00',
  discount: '- ₹ 50.00',
  total: '₹ 467.70',
  amount: '₹ 500.00',
  newBalance: '₹ 1,250.00',
  paymentId: 'pay_QR4x7K9mNz2bL1',
  invoiceNumber: 'INV-2026-0042',
  invoiceDate: '22 July 2026',
  itemRowsHtml: '<tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6"><strong>2x</strong> Classic Peanut Butter Bowl</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 290.00</td></tr><tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6"><strong>1x</strong> Green Protein Smoothie</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 195.00</td></tr>',
  lineItemsHtml: '<tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6">Classic Peanut Butter Bowl x2</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 290.00</td></tr><tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6">Green Protein Smoothie x1</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 195.00</td></tr>',
  deliveryFeeRowHtml: '',
  discountRowHtml: '<tr><td style="padding:5px 0;color:#4CAF50">Discount</td><td style="padding:5px 0;text-align:right;color:#4CAF50">- ₹ 50.00</td></tr>',
};

const templates = [
  { name: 'standard', label: 'Standard', desc: 'General purpose / welcome' },
  { name: 'otp-verification', label: 'OTP Verification', desc: 'Login / signup OTP' },
  { name: 'password-reset', label: 'Password Reset', desc: 'Reset link email' },
  { name: 'order-confirmation', label: 'Order Confirmation', desc: 'After order placed' },
  { name: 'wallet-topup', label: 'Wallet Top-up', desc: 'Payment received' },
  { name: 'invoice', label: 'Invoice', desc: 'Order invoice / receipt' },
];

function render(html) {
  let output = html;
  for (const [key, val] of Object.entries(sampleData)) {
    output = output.replaceAll('{{' + key + '}}', val);
    output = output.replaceAll('{{{' + key + '}}}', val);
  }
  return output;
}

async function loadAll() {
  const grid = document.getElementById('grid');
  for (const tpl of templates) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-header"><h3>${tpl.label}</h3><span>${tpl.desc}</span></div>`;
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-same-origin';
    card.appendChild(iframe);
    grid.appendChild(card);

    fetch('/email-templates/' + tpl.name + '.html')
      .then(r => r.text())
      .then(html => { iframe.srcdoc = render(html); });
  }
}

loadAll();
</script>
</body>
</html>
