<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Email Template Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; }
.nav { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: #1a1a1a; border-right: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 10; }
.nav h2 { font-size: 14px; color: #F5B731; margin-bottom: 16px; letter-spacing: .05em; text-transform: uppercase; }
.nav button { display: block; width: 100%; text-align: left; background: none; border: none; color: #ccc; padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 4px; transition: all .15s; }
.nav button:hover, .nav button.active { background: #262626; color: #4CAF50; }
.preview { margin-left: 260px; padding: 24px; }
.preview iframe { width: 100%; height: calc(100vh - 48px); border: 1px solid #333; border-radius: 12px; background: #fff; }
.mode-toggle { position: fixed; bottom: 20px; left: 20px; z-index: 20; }
.mode-toggle button { background: #333; border: 1px solid #555; color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }
.mode-toggle button:hover { background: #444; }
</style>
</head>
<body>
<div class="nav">
<h2>Email Templates</h2>
<button class="active" onclick="load('standard', this)">Standard</button>
<button onclick="load('otp-verification', this)">OTP Verification</button>
<button onclick="load('password-reset', this)">Password Reset</button>
<button onclick="load('order-confirmation', this)">Order Confirmation</button>
<button onclick="load('wallet-topup', this)">Wallet Top-up</button>
<button onclick="load('invoice', this)">Invoice</button>
</div>
<div class="preview">
<iframe id="frame" sandbox="allow-same-origin"></iframe>
</div>
<div class="mode-toggle">
<button onclick="toggleWidth()">Toggle Mobile / Desktop</button>
</div>
<script>
const sampleData = {
  brandName: 'PNUT MONSTER',
  brandColor: '#4CAF50',
  accentColor: '#F5B731',
  logoUrl: '/icons/icon-192.png',
  websiteUrl: 'http://localhost:3001',
  userName: 'Jatin',
  heading: 'Welcome to PNUT MONSTER!',
  message: 'Thanks for joining the healthy food revolution. Your account is ready and waiting for your first delicious order.',
  buttonText: 'Start Ordering',
  buttonUrl: 'http://localhost:3001/menu',
  footerText: 'Healthy food, made monstrously delicious.',
  supportEmail: 'support@pnut.monster',
  socialInstagramUrl: 'https://instagram.com/pnutmonster',
  socialFacebookUrl: 'https://facebook.com/pnutmonster',
  socialXUrl: 'https://x.com/pnutmonster',
  privacyUrl: 'http://localhost:3001/privacy',
  termsUrl: 'http://localhost:3001/terms',
  contactUrl: 'http://localhost:3001/contact',
  currentYear: '2026',
  companyName: 'PNUT Monster Foods Private Limited',
  otp: '847293',
  expiryTime: '10 minutes',
  resetLink: 'http://localhost:3001/reset-password?token=abc123xyz',
  orderNumber: 'PM-20260722-0042',
  outletName: 'PNUT MONSTER HSR Layout',
  orderType: 'Pickup',
  paymentMethod: 'Wallet',
  estimatedTime: 'Ready in ~15 minutes',
  subtotal: '₹ 485.00',
  discount: '- ₹ 50.00',
  total: '₹ 467.70',
  amount: '₹ 500.00',
  newBalance: '₹ 1,250.00',
  paymentId: 'pay_QR4x7K9mNz2bL1',
  invoiceNumber: 'INV-2026-0042',
  invoiceDate: '22 July 2026',
  itemRowsHtml: '<tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6"><strong>2x</strong> Classic Peanut Butter Bowl</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 290.00</td></tr><tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6"><strong>1x</strong> Green Protein Smoothie</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 195.00</td></tr>',
  lineItemsHtml: '<tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6">Classic Peanut Butter Bowl x2</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 290.00</td></tr><tr><td style="padding:10px 0;border-bottom:1px solid #F3F4F6">Green Protein Smoothie x1</td><td style="padding:10px 0;border-bottom:1px solid #F3F4F6;text-align:right">₹ 195.00</td></tr>',
  deliveryFeeRowHtml: '',
  discountRowHtml: '<tr><td style="padding:5px 0;color:#4CAF50">Discount</td><td style="padding:5px 0;text-align:right;color:#4CAF50">- ₹ 50.00</td></tr>',
};

const templates = {};

async function fetchTemplate(name) {
  if (templates[name]) return templates[name];
  const res = await fetch('/email-templates/' + name + '.html');
  const html = await res.text();
  templates[name] = html;
  return html;
}

function render(html) {
  let output = html;
  for (const [key, val] of Object.entries(sampleData)) {
    output = output.replaceAll('{{' + key + '}}', val);
    output = output.replaceAll('{{{' + key + '}}}', val);
  }
  return output;
}

async function load(name, btn) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const html = await fetchTemplate(name);
  const rendered = render(html);
  const frame = document.getElementById('frame');
  frame.srcdoc = rendered;
}

let isMobile = false;
function toggleWidth() {
  isMobile = !isMobile;
  const frame = document.getElementById('frame');
  frame.style.maxWidth = isMobile ? '375px' : '100%';
  frame.style.margin = isMobile ? '0 auto' : '0';
}

load('standard');
</script>
</body>
</html>
